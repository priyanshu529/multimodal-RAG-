<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERGE</title>
<style>
  :root {
    --bg-main: #060607;
    --bg-sidebar: rgba(8, 8, 10, 0.88);
    --bg-input: rgba(22, 22, 25, 0.8);
    --border: #2c2c31;
    --border-hover: #55555c;
    --text-primary: #f2f2f3;
    --text-secondary: #b4b4ba;
    --text-muted: #85858c;
    --accent-1: #e4e4e7;
    --accent-2: #4b4b52;
    --error: #f87171;
    --success: #34d399;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ---------------- Space background (photographic) ---------------- */
  .space-bg {
    position: fixed;
    inset: 0;
    z-index: -5;
    background: #000000;
  }

  /* Diffuse Milky Way dust band, kept muted/desaturated so the overall
     feel stays dark and neutral rather than blue, while still reading as
     a photographic haze rather than a flat illustrated shape. */
  .milkyway {
    position: fixed;
    inset: -15%;
    z-index: -4;
    pointer-events: none;
    background:
      radial-gradient(ellipse 100% 16% at 8% 82%, rgba(190, 190, 195, 0.14), transparent 65%),
      radial-gradient(ellipse 90% 15% at 30% 76%, rgba(180, 180, 185, 0.13), transparent 65%),
      radial-gradient(ellipse 80% 14% at 52% 68%, rgba(175, 175, 178, 0.11), transparent 65%),
      radial-gradient(ellipse 65% 13% at 72% 60%, rgba(190, 190, 188, 0.10), transparent 65%),
      radial-gradient(ellipse 55% 16% at 88% 55%, rgba(205, 200, 185, 0.11), transparent 68%),
      radial-gradient(ellipse 40% 12% at 97% 50%, rgba(210, 205, 190, 0.09), transparent 70%);
    filter: blur(14px);
    transform: rotate(-11deg) scale(1.15);
    mix-blend-mode: screen;
    opacity: 0.85;
  }

  /* A second, tighter/darker dust layer for depth -- faint dark lanes
     running through the bright band, like real interstellar dust. */
  .milkyway-dust {
    position: fixed;
    inset: -15%;
    z-index: -4;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 6% at 20% 80%, rgba(0,0,0,0.5), transparent 70%),
      radial-gradient(ellipse 50% 5% at 42% 72%, rgba(0,0,0,0.46), transparent 70%),
      radial-gradient(ellipse 45% 5% at 63% 63%, rgba(0,0,0,0.4), transparent 70%),
      radial-gradient(ellipse 35% 5% at 82% 56%, rgba(0,0,0,0.32), transparent 72%);
    filter: blur(9px);
    transform: rotate(-11deg) scale(1.15);
    opacity: 0.9;
  }

  /* Very faint, heavily blurred smudge standing in for a distant galaxy,
     like the small spiral visible in the reference photo. Kept subtle and
     out of focus so it doesn't read as a cartoon icon. */
  .distant-galaxy {
    position: fixed;
    z-index: -3;
    top: 12%;
    left: 16%;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(210, 210, 215, 0.42) 0%, rgba(160, 160, 168, 0.15) 45%, transparent 75%);
    filter: blur(2.5px);
    pointer-events: none;
  }

  .stars, .stars2, .stars3 {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: transparent;
    pointer-events: none;
  }
  .stars { animation: drift 220s linear infinite; }
  .stars2 { animation: drift 340s linear infinite; }
  .stars3 { animation: drift 460s linear infinite reverse; }

  /* Subtle grain over everything so the star field reads as a photograph
     rather than flat vector dots. */
  .grain {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 180px 180px;
  }

  @keyframes drift {
    from { transform: translateY(0); }
    to { transform: translateY(-1200px); }
  }

  .app { display: flex; height: 100vh; width: 100%; position: relative; z-index: 1; }

  /* ---------------- Login screen ---------------- */
  .login-screen {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* A soft, localized dark vignette behind the card only -- keeps the form
     readable while letting the stars and Milky Way band show through
     everywhere else, instead of covering the whole screen with a solid box. */
  .login-screen::before {
    content: "";
    position: absolute;
    width: 620px;
    height: 620px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.3) 45%, transparent 72%);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    width: 340px;
    background: rgba(6, 6, 8, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 32px 28px;
    backdrop-filter: blur(22px) saturate(120%);
    -webkit-backdrop-filter: blur(22px) saturate(120%);
    box-shadow:
      0 0 1px rgba(255, 255, 255, 0.12) inset,
      0 0 50px rgba(255, 255, 255, 0.04),
      0 20px 50px rgba(0, 0, 0, 0.65);
    text-align: center;
  }

  .login-logo {
    width: 52px;
    height: 52px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fafafa, var(--accent-1) 45%, var(--accent-2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.18), 0 0 8px rgba(255, 255, 255, 0.4);
  }

  .login-logo svg { stroke: #0a0a0b; }

  .login-card h1 {
    font-size: 20px;
    margin: 0 0 4px;
    letter-spacing: 0.04em;
  }
  .login-card p {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 22px;
  }

  .login-field {
    text-align: left;
    margin-bottom: 14px;
  }
  .login-field label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .login-field input {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .login-field input:focus { border-color: var(--border-hover); background: rgba(255, 255, 255, 0.07); }

  .login-btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    color: #0a0a0b;
    background: linear-gradient(135deg, var(--accent-1), #9a9aa2);
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:disabled { opacity: 0.5; cursor: default; }

  .login-error {
    color: var(--error);
    font-size: 12.5px;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ---------------- Sidebar ---------------- */
  .sidebar {
    width: 260px;
    background: var(--bg-sidebar);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.2s ease, padding 0.2s ease;
    overflow: hidden;
  }
  .sidebar.collapsed { width: 0; border-right: none; }

  .sidebar-inner { width: 260px; padding: 12px; display: flex; flex-direction: column; height: 100%; }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px 16px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, var(--accent-1), #8a8a92);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .new-chat-btn:hover { background: rgba(255, 255, 255, 0.09); }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    padding: 0 4px;
    margin: 20px 0 8px;
  }

  .chat-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    flex: 1;
  }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }
  .chat-item:hover { background: rgba(255, 255, 255, 0.06); }
  .chat-item:hover .chat-delete { display: flex; }
  .chat-item.active { background: rgba(255, 255, 255, 0.12); color: var(--text-primary); }

  .chat-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-delete {
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    color: var(--text-muted);
  }
  .chat-delete:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }

  /* ---------------- Main panel ---------------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    flex-shrink: 0;
    background: rgba(6, 6, 7, 0.5);
    backdrop-filter: blur(6px);
  }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-primary);
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: rgba(255, 255, 255, 0.1); }

  .topbar-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
  }

  /* ---------------- Document bar (top of chat) ----------------
     Shows every PDF attached to the currently open chat, fetched from the
     server (GET /chats/{id}/documents) -- so it survives reloads and
     switching chats, unlike the old browser-memory-only tracking. */
  .doc-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
  }
  .doc-bar:empty { display: none; }

  .doc-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12.5px;
    color: var(--text-secondary);
    max-width: 240px;
  }
  .doc-chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .doc-chip svg { flex-shrink: 0; color: var(--accent-1); }

  .messages {
    flex: 1;
    overflow-y: auto;
  }

  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 16px;
    text-align: center;
  }

  .empty-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-1), #8a8a92);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
  }
  .empty-icon svg { stroke: #0a0a0b; }

  .empty-state h1 { font-size: 22px; font-weight: 600; margin: 0; color: var(--text-primary); }
  .empty-state p { font-size: 14px; color: var(--text-muted); max-width: 380px; margin: 0; }

  .message-list {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .msg-row { display: flex; gap: 12px; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
  }
  .avatar.user { background: #38383e; }
  .avatar.assistant { background: linear-gradient(135deg, var(--accent-1), #8a8a92); }
  .avatar.assistant svg { stroke: #0a0a0b; }

  .msg-col { display: flex; flex-direction: column; }
  .msg-row.user .msg-col { align-items: flex-end; max-width: 75%; }
  .msg-row.assistant .msg-col { flex: 1; max-width: none; }

  .msg-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    margin-bottom: 4px;
    padding: 0 2px;
  }
  .msg-row.assistant .msg-label { color: var(--accent-1); }

  .msg-content {
    padding-top: 3px;
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
    min-width: 0;
  }

  .msg-content.assistant {
    padding: 3px 0 0;
    color: var(--text-primary);
  }

  .msg-content.user {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.14);
    color: var(--text-primary);
    font-weight: 400;
    padding: 10px 15px;
    border-radius: 16px;
    border-bottom-right-radius: 4px;
  }

  .msg-content.error {
    color: var(--error);
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248, 113, 113, 0.25);
    padding: 10px 15px;
    border-radius: 12px;
  }

  .msg-system {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 2px 0;
  }

  .msg-system.success {
    color: var(--success);
    font-weight: 700;
    letter-spacing: 0.03em;
    font-size: 13px;
    padding: 6px 14px;
    display: inline-block;
    margin: 0 auto;
    border: 1px solid rgba(52, 211, 153, 0.4);
    border-radius: 20px;
    background: rgba(52, 211, 153, 0.08);
    box-shadow: 0 0 18px rgba(52, 211, 153, 0.15);
  }
  .msg-system.success-wrap { text-align: center; }

  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 10px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-1);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .input-area {
    padding: 8px 16px 22px;
    flex-shrink: 0;
  }

  .input-wrap { max-width: 760px; margin: 0 auto; }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: var(--border-hover); }
  .input-box.uploading { border-color: var(--accent-1); }

  #question-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text-primary);
    font-size: 14.5px;
    font-family: inherit;
    line-height: 1.5;
    padding: 6px 0;
    max-height: 160px;
  }
  #question-input::placeholder { color: var(--text-muted); }
  #question-input:disabled { color: var(--text-muted); }

  .send-btn {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent-1), #8a8a92);
    color: #0a0a0b;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .send-btn:disabled { background: #2c2c31; color: #6c6c74; cursor: default; }

  .attach-btn {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 1px;
  }
  .attach-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
  .attach-btn:disabled { opacity: 0.5; cursor: default; }

  .attached-files {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .attached-files:empty { display: none; }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12.5px;
    color: var(--text-secondary);
    max-width: 220px;
    transition: border-color 0.15s, color 0.15s;
  }
  .file-chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-chip.uploading {
    border-color: var(--accent-1);
    color: var(--accent-1);
  }
  .file-chip.uploading .file-chip-icon {
    animation: spin 0.8s linear infinite;
  }
  .file-chip.done .file-chip-icon { color: var(--success); }
  .file-chip.error {
    border-color: var(--error);
    color: var(--error);
  }

  .disclaimer {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    margin: 10px 0 0;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.16); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row, .msg-system, .msg-system.success-wrap {
    animation: fadeIn 0.22s ease-out;
  }

  .msg-system.error-text {
    color: var(--error);
  }
  .msg-system.uploading-text {
    color: var(--accent-1);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    width: 100%;
  }
  .msg-system.uploading-text .spinner {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.18);
    border-top-color: var(--accent-1);
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .hidden { display: none !important; }


</style>
</head>
<body>

<div class="space-bg"></div>
<div class="milkyway"></div>
<div class="milkyway-dust"></div>
<div class="distant-galaxy"></div>
<svg class="stars" id="stars-1" width="0" height="0"></svg>
<svg class="stars" id="stars-2" width="0" height="0"></svg>
<svg class="stars" id="stars-3" width="0" height="0"></svg>
<div class="grain"></div>

<!-- Login gate -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
    </div>
    <h1>MERGE</h1>
    <p>Sign in to access your documents</p>

    <div class="login-field">
      <label for="login-user">Username</label>
      <input type="text" id="login-user" autocomplete="username" placeholder="admin">
    </div>
    <div class="login-field">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button type="button" class="login-btn" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<script>
  // Point this at your FastAPI server (see main.py)
  const API_BASE = "http://localhost:8000";

  /* ---------------- Starfield generation (photographic) ----------------
     Real star fields are mostly tiny, dim, near-white/blue-white points
     with only a handful of noticeably brighter stars, plus a warm outlier
     here and there. Density is much higher than a "cartoon" star layer,
     twinkle is rare and subtle (most real stars barely flicker to the
     naked eye/camera), and stars cluster more densely inside the Milky
     Way band, thinning out toward the top of the frame. */
  function starColor() {
    const r = Math.random();
    if (r < 0.78) return "#eceef2";   // near-white, most common
    if (r < 0.92) return "#c9ccd4";   // pale cool gray
    if (r < 0.97) return "#e9e2cf";   // pale warm/gold
    return "#f2ead2";                 // rare brighter warm star
  }

  function buildStarLayer(el, count, maxSize, twinklePct, bandBias) {
    const w = window.innerWidth, h = window.innerHeight * 3;
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" style="position:fixed;top:0;left:0;">`;
    for (let i = 0; i < count; i++) {
      let x = Math.random() * w;
      let y;
      // Bias a portion of stars toward a diagonal band (mimics denser star
      // count along the Milky Way plane, like the reference photo).
      if (bandBias && Math.random() < 0.55) {
        const bandCenter = h * 0.68 - (x / w) * h * 0.22;
        y = bandCenter + (Math.random() - 0.5) * h * 0.28;
      } else {
        y = Math.random() * h;
      }
      y = Math.max(0, Math.min(h, y));

      // Most stars are faint pinpoints; a small fraction are brighter.
      const brightRoll = Math.random();
      const r = brightRoll > 0.985 ? maxSize * (1.6 + Math.random())
              : brightRoll > 0.9 ? maxSize * (0.9 + Math.random() * 0.6)
              : maxSize * (0.15 + Math.random() * 0.5);
      const baseOpacity = (0.35 + Math.random() * 0.55).toFixed(2);
      const color = starColor();

      svg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(2)}" fill="${color}" opacity="${baseOpacity}">`;
      if (Math.random() < twinklePct) {
        const dur = (Math.random() * 4 + 3).toFixed(2);
        const delay = (Math.random() * 4).toFixed(2);
        const lo = Math.max(0.15, baseOpacity - 0.35).toFixed(2);
        svg += `<animate attributeName="opacity" values="${lo};${baseOpacity};${lo}" dur="${dur}s" begin="${delay}s" repeatCount="indefinite"/>`;
      }
      // A faint soft glow halo on the brighter stars only, for a slight
      // photographic bloom instead of a hard vector dot.
      if (brightRoll > 0.9) {
        svg += `</circle><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(r * 3).toFixed(2)}" fill="${color}" opacity="${(baseOpacity * 0.12).toFixed(2)}"/>`;
      } else {
        svg += `</circle>`;
      }
    }
    svg += `</svg>`;
    el.outerHTML = svg;
  }
  buildStarLayer(document.getElementById("stars-1"), 520, 0.9, 0.06, true);
  buildStarLayer(document.getElementById("stars-2"), 340, 1.1, 0.08, true);
  buildStarLayer(document.getElementById("stars-3"), 260, 1.3, 0.05, false);

  // Defense-in-depth: if this page is ever embedded inside a <form> (e.g.
  // by a wrapping template/CMS), stop any 'submit' event from causing a
  // full-page navigation/reload. Under normal standalone use this file has
  // no <form> element, so this listener simply never fires.
  window.addEventListener("submit", (e) => { e.preventDefault(); });

  /* ---------------- Auth ---------------- */
  const loginScreen = document.getElementById("login-screen");
  const appRoot = document.getElementById("app-root");
  const loginUser = document.getElementById("login-user");
  const loginPass = document.getElementById("login-pass");
  const loginBtn = document.getElementById("login-btn");
  const loginError = document.getElementById("login-error");
  const logoutBtn = document.getElementById("logout-btn");

  function authHeaders() {
    const token = localStorage.getItem("merge_token");
    return token ? { "Authorization": "Bearer " + token } : {};
  }

  function showApp() {
    loginScreen.classList.add("hidden");
    appRoot.classList.remove("hidden");
  }

  function showLogin() {
    appRoot.classList.add("hidden");
    loginScreen.classList.remove("hidden");
  }

  async function attemptLogin() {
    const username = loginUser.value.trim();
    const password = loginPass.value;
    if (!username || !password) {
      loginError.textContent = "Enter a username and password.";
      return;
    }
    loginBtn.disabled = true;
    loginError.textContent = "";
    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Login failed");
      localStorage.setItem("merge_token", data.token);
      showApp();
      init();
    } catch (err) {
      loginError.textContent = err.message;
    } finally {
      loginBtn.disabled = false;
    }
  }

  loginBtn.addEventListener("click", attemptLogin);
  loginPass.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptLogin(); });
  loginUser.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptLogin(); });

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("merge_token");
    showLogin();
  });

  /* ---------------- App logic ---------------- */
  const sidebar = document.getElementById("sidebar");
  const sidebarToggle = document.getElementById("sidebar-toggle");
  const newChatBtn = document.getElementById("new-chat-btn");
  const uploadBtn = document.getElementById("upload-btn");
  const uploadIcon = document.getElementById("upload-icon");
  const fileInput = document.getElementById("file-input");
  const attachedFilesEl = document.getElementById("attached-files");
  const docBarEl = document.getElementById("doc-bar");
  const chatListEl = document.getElementById("chat-list");
  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("empty-state");
  const messageList = document.getElementById("message-list");
  const questionInput = document.getElementById("question-input");
  const sendBtn = document.getElementById("send-btn");
  const inputBox = document.getElementById("input-box");
  const disclaimer = document.getElementById("disclaimer");

  let isSending = false;
  let isUploading = false;
  let currentChatId = null;

  // Per-chat list of attached files, keyed by chat id. Seeded from the
  // server's persisted `documents` table whenever a chat is opened (see
  // loadChatDocuments), and updated locally as new uploads complete --
  // so files show up both right after upload AND after switching chats
  // or reloading the page.
  const filesByChat = {};

  // Local cache of the sidebar chat list, kept in sync by refreshChatList.
  // Used to rename a chat's title locally (once its first question is
  // answered) without an extra network round-trip.
  let chatsCache = [];

  sidebarToggle.addEventListener("click", () => sidebar.classList.toggle("collapsed"));

  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      ...options,
      headers: { ...(options.headers || {}), ...authHeaders() }
    });
    if (res.status === 401) {
      localStorage.removeItem("merge_token");
      showLogin();
      throw new Error("Session expired. Please sign in again.");
    }
    return res;
  }

  newChatBtn.addEventListener("click", async () => {
    const res = await apiFetch(`/chats`, { method: "POST" });
    const chat = await res.json();
    await refreshChatList();
    openChat(chat.id);
  });

  // Builds a single sidebar chat-item element. Only called once per chat id
  // (see renderChatList) -- never regenerated on every refresh, which is
  // what was causing the visible flicker whenever a message was sent.
  function createChatItem(chat) {
    const item = document.createElement("div");
    item.className = "chat-item";
    item.dataset.chatId = chat.id;
    item.innerHTML = `
      <span class="chat-title"></span>
      <span class="chat-delete" title="Delete chat">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a2 2 0 012-2h0a2 2 0 012 2v2"/></svg>
      </span>
    `;
    item.addEventListener("click", () => openChat(chat.id));
    item.querySelector(".chat-delete").addEventListener("click", async (e) => {
      e.stopPropagation();
      await apiFetch(`/chats/${chat.id}`, { method: "DELETE" });
      delete filesByChat[chat.id];
      if (chat.id === currentChatId) currentChatId = null;
      await refreshChatList();
      if (currentChatId === null) showEmptyChatState();
    });
    return item;
  }

  // Reconciles the sidebar with the latest chat list in place -- updates
  // titles/active state on existing nodes, adds new ones, removes deleted
  // ones -- instead of wiping and rebuilding the whole list on every call.
  // A full innerHTML rebuild (the old approach) repaints every row (and
  // its backdrop-filter) each time, which is what caused the flicker after
  // every question, since sending a message used to also refresh the chat
  // list over the network just to pick up the auto-generated title.
  function renderChatList(allChats) {
    const existing = new Map();
    Array.from(chatListEl.children).forEach((el) => existing.set(Number(el.dataset.chatId), el));

    allChats.forEach((chat, index) => {
      let item = existing.get(chat.id);
      if (!item) {
        item = createChatItem(chat);
        existing.set(chat.id, item);
      }
      const titleEl = item.querySelector(".chat-title");
      if (titleEl.textContent !== chat.title) titleEl.textContent = chat.title;
      item.classList.toggle("active", chat.id === currentChatId);

      const nodeAtIndex = chatListEl.children[index];
      if (nodeAtIndex !== item) chatListEl.insertBefore(item, nodeAtIndex || null);
    });

    const currentIds = new Set(allChats.map((c) => c.id));
    existing.forEach((el, id) => { if (!currentIds.has(id)) el.remove(); });
  }

  async function refreshChatList() {
    const res = await apiFetch(`/chats`);
    chatsCache = await res.json();
    renderChatList(chatsCache);
  }

  // After the first question in a chat gets answered, the backend
  // auto-titles that chat (see chats.set_title_if_default). Mirror that
  // rename locally -- same truncation rule, no network call -- instead of
  // re-fetching the whole chat list on every single message, which was
  // causing the sidebar to flicker after every send.
  function maybeRenameChatLocally(chatId, question) {
    const chat = chatsCache.find((c) => c.id === chatId);
    if (chat && chat.title === "New chat") {
      chat.title = question.trim().slice(0, 50);
      renderChatList(chatsCache);
    }
  }

  async function openChat(chatId) {
    currentChatId = chatId;
    await refreshChatList();

    const [messagesRes] = await Promise.all([
      apiFetch(`/chats/${chatId}/messages`),
      loadChatDocuments(chatId),
    ]);
    const history = await messagesRes.json();

    messageList.innerHTML = "";
    if (history.length === 0) {
      emptyState.style.display = "flex";
      messageList.style.display = "none";
    } else {
      history.forEach((m) => addMessage(m.role, m.content, false));
    }
  }

  function showEmptyChatState() {
    messageList.innerHTML = "";
    messageList.style.display = "none";
    emptyState.style.display = "flex";
    docBarEl.innerHTML = "";
    renderAttachedFiles();
  }

  async function ensureChat() {
    if (currentChatId !== null) return currentChatId;
    const res = await apiFetch(`/chats`, { method: "POST" });
    const chat = await res.json();
    currentChatId = chat.id;
    await refreshChatList();
    return currentChatId;
  }

  // Pulls the persisted list of PDFs already indexed into this chat from
  // the server, so previously uploaded files keep showing (both as chips
  // near the input box and in the doc bar at the top of the chat) even
  // after a page reload or after switching to another chat and back.
  async function loadChatDocuments(chatId) {
    try {
      const res = await apiFetch(`/chats/${chatId}/documents`);
      const docs = await res.json();
      filesByChat[chatId] = docs.map((d) => ({ name: d.filename, status: "done" }));
    } catch (err) {
      filesByChat[chatId] = filesByChat[chatId] || [];
    }
    renderAttachedFiles();
  }

  function fileChipMarkup(f) {
    let icon;
    if (f.status === "uploading") {
      icon = `<svg class="file-chip-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>`;
    } else if (f.status === "error") {
      icon = `<svg class="file-chip-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    } else {
      icon = `<svg class="file-chip-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`;
    }
    const label = f.status === "uploading" ? `Uploading ${f.name}…`
                : f.status === "error" ? `${f.name} failed`
                : f.name;
    return { icon, label };
  }

  function renderAttachedFiles() {
    const files = filesByChat[currentChatId] || [];

    // Chips near the input box (all statuses, including in-flight uploads)
    attachedFilesEl.innerHTML = files.map((f) => {
      const { icon, label } = fileChipMarkup(f);
      return `
        <div class="file-chip ${f.status}" title="${escapeHtml(label)}">
          ${icon}
          <span>${escapeHtml(label)}</span>
        </div>
      `;
    }).join("");

    // Doc bar at the top of the chat -- only successfully indexed files,
    // so it reads as "documents available in this chat", persisted across
    // reloads/chat switches via loadChatDocuments().
    docBarEl.innerHTML = files.filter((f) => f.status === "done").map((f) => {
      const { icon, label } = fileChipMarkup(f);
      return `
        <div class="doc-chip" title="${escapeHtml(label)}">
          ${icon}
          <span>${escapeHtml(label)}</span>
        </div>
      `;
    }).join("");
  }

  function setUploadingState(uploading) {
    isUploading = uploading;
    uploadBtn.disabled = uploading;
    uploadIcon.classList.toggle("spin", uploading);
    questionInput.disabled = uploading;
    inputBox.classList.toggle("uploading", uploading);
    questionInput.placeholder = uploading
      ? "Indexing your PDF… hang tight"
      : "Ask a question about your uploaded document(s)…";
    disclaimer.textContent = uploading
      ? "Indexing document — you can ask questions once it's ready."
      : "Answers are generated from PDFs uploaded in this chat only.";
    updateSendState();
  }

  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith(".pdf")) {
      addSystemMessage(`"${file.name}" isn't a PDF. Upload a .pdf file.`);
      fileInput.value = "";
      return;
    }

    let statusEl = null;

    try {
      const chatId = await ensureChat();

      if (!filesByChat[chatId]) filesByChat[chatId] = [];
      const fileEntry = { name: file.name, status: "uploading" };
      filesByChat[chatId].push(fileEntry);
      renderAttachedFiles();
      setUploadingState(true);

      // Immediate, guaranteed feedback the moment the upload starts.
      statusEl = addStatusMessage(`Uploading ${file.name}…`, "uploading");

      const formData = new FormData();
      formData.append("file", file);

      const res = await apiFetch(`/chats/${chatId}/upload`, { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Upload failed");

      fileEntry.status = "done";
      renderAttachedFiles();

      updateStatusMessage(statusEl, `✓ ${file.name} indexed — ${data.chunks_added} chunks added.`, "done");
      addSuccessMessage("YOU'RE ALL SET TO ASK QUESTIONS");
    } catch (err) {
      const message = `Upload failed: ${err.message}`;
      if (statusEl) {
        updateStatusMessage(statusEl, message, "error");
      } else {
        addSystemMessage(message);
      }
      const chatId = currentChatId;
      if (chatId && filesByChat[chatId] && filesByChat[chatId].length) {
        filesByChat[chatId][filesByChat[chatId].length - 1].status = "error";
        renderAttachedFiles();
      }
    } finally {
      setUploadingState(false);
      fileInput.value = "";
    }
  });

  function showMessageList() {
    emptyState.style.display = "none";
    messageList.style.display = "flex";
  }

  function addSystemMessage(text) {
    showMessageList();
    const div = document.createElement("div");
    div.className = "msg-system";
    div.textContent = text;
    messageList.appendChild(div);
    scrollToBottom();
    return div;
  }

  // Creates a status line that can be updated in place (e.g. "Uploading…"
  // morphing into "✓ indexed") instead of stacking multiple messages.
  function addStatusMessage(text, kind) {
    showMessageList();
    const div = document.createElement("div");
    div.className = "msg-system";
    setStatusMessageState(div, text, kind);
    messageList.appendChild(div);
    scrollToBottom();
    return div;
  }

  function updateStatusMessage(el, text, kind) {
    setStatusMessageState(el, text, kind);
    scrollToBottom();
  }

  function setStatusMessageState(el, text, kind) {
    el.classList.remove("uploading-text", "error-text");
    if (kind === "uploading") {
      el.classList.add("uploading-text");
      el.innerHTML = `<span class="spinner"></span><span>${escapeHtml(text)}</span>`;
    } else if (kind === "error") {
      el.classList.add("error-text");
      el.textContent = text;
    } else {
      el.textContent = text;
    }
  }

  function addSuccessMessage(text) {
    showMessageList();
    const wrap = document.createElement("div");
    wrap.className = "msg-system success-wrap";
    const badge = document.createElement("span");
    badge.className = "msg-system success";
    badge.textContent = text;
    wrap.appendChild(badge);
    messageList.appendChild(wrap);
    scrollToBottom();
  }

  function addMessage(role, text, isError) {
    showMessageList();
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    if (role === "user") {
      avatar.textContent = "You";
    } else {
      avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`;
    }

    const col = document.createElement("div");
    col.className = "msg-col";

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "You" : (isError ? "Error" : "Assistant");

    const content = document.createElement("div");
    content.className = `msg-content ${role}` + (isError ? " error" : "");
    content.textContent = text;

    col.appendChild(label);
    col.appendChild(content);
    row.appendChild(avatar);
    row.appendChild(col);
    messageList.appendChild(row);
    scrollToBottom();
  }

  function addTypingIndicator() {
    showMessageList();
    const row = document.createElement("div");
    row.className = "msg-row assistant";
    row.innerHTML = `
      <div class="avatar assistant"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div>
      <div class="msg-col">
        <div class="msg-label">Assistant</div>
        <div class="msg-content assistant">
          <div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        </div>
      </div>
    `;
    messageList.appendChild(row);
    scrollToBottom();
    return row;
  }

  // Turns an in-flight typing-indicator row into the final answer, mutating
  // the SAME row/content element rather than deleting it and inserting a
  // new one, so the answer appears seamlessly with no layout jump.
  function resolveTypingIndicator(row, text, isError) {
    if (!row || !row.isConnected) {
      addMessage("assistant", text, isError);
      return;
    }
    const label = row.querySelector(".msg-label");
    if (label) label.textContent = isError ? "Error" : "Assistant";

    const content = row.querySelector(".msg-content");
    if (content) {
      content.classList.toggle("error", !!isError);
      content.textContent = text;
    }
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  async function sendMessage() {
    const question = questionInput.value.trim();
    if (!question || isSending || isUploading) return;

    const chatId = await ensureChat();

    addMessage("user", question, false);
    questionInput.value = "";
    autoResize();
    updateSendState();

    isSending = true;
    const typingRow = addTypingIndicator();

    try {
      const res = await apiFetch(`/chats/${chatId}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Query failed");
      resolveTypingIndicator(typingRow, data.answer, false);
      // Rename the chat in the sidebar locally if this was its first
      // question -- no network round-trip, so no sidebar flicker.
      maybeRenameChatLocally(chatId, question);
    } catch (err) {
      resolveTypingIndicator(typingRow, `Something went wrong: ${err.message}`, true);
    } finally {
      isSending = false;
      updateSendState();
    }
  }

  // On page load: show existing chats, and open the most recent one if any
  async function init() {
    await refreshChatList();
    if (chatsCache.length > 0) {
      openChat(chatsCache[0].id);
    }
  }

  sendBtn.addEventListener("click", (e) => {
    e.preventDefault();
    sendMessage();
  });

  questionInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();
      sendMessage();
    }
  });

  questionInput.addEventListener("input", () => {
    autoResize();
    updateSendState();
  });

  function autoResize() {
    questionInput.style.height = "auto";
    questionInput.style.height = Math.min(questionInput.scrollHeight, 160) + "px";
  }

  function updateSendState() {
    sendBtn.disabled = questionInput.value.trim() === "" || isSending || isUploading;
  }

  // Boot: if a token already exists, skip straight to the app
  if (localStorage.getItem("merge_token")) {
    showApp();
    init();
  } else {
    showLogin();
  }
</script>

</body>
</html>
